name: 减脂助手网站验证与部署
on:
  push:
    branches: [main]
    paths: ["减脂助手网站/**", ".github/workflows/减脂助手网站.yml"]
  pull_request:
    paths: ["减脂助手网站/**", ".github/workflows/减脂助手网站.yml"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 减脂助手网站
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run build
      - run: git diff --exit-code -- js/app.bundle.js
      - run: npm test
      - run: npm run validate
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 减脂助手网站
      - id: deployment
        uses: actions/deploy-pages@v4
