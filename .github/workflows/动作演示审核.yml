name: 动作演示审核包

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "减脂助手网站/js/motion-catalog.js"
      - "减脂助手网站/js/exercise-catalog.js"
      - "减脂助手网站/js/app.js"
      - "减脂助手网站/styles.css"
      - "减脂助手网站/动作演示审核.html"
      - "减脂助手网站/assets/motions/**"

permissions:
  contents: read

jobs:
  build-review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 减脂助手网站
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 构建并验证动作数据
        run: |
          npm run build
          npm test
          npm run validate
      - name: 生成可下载审核包
        run: |
          mkdir motion-review-package
          cp index.html "动作演示审核.html" styles.css motion-review-package/
          cp -R js assets motion-review-package/
      - uses: actions/upload-artifact@v4
        with:
          name: 动作演示审核包
          path: 减脂助手网站/motion-review-package
          retention-days: 14
